<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>

<style>

/*  THEME VARIABLES */
:root {
  --bg: #f4efe6;
  --panel: #ffffff;
  --text: #2a2016;
  --accent: #c8901a;
  --border: #b89050;
  --subtext: #7a6840;
  --toggle-bg: #ecdcb8;
  --toggle-border: #b89050;
  --toggle-icon: #7a5008;
  --toggle-hover: #e0d0a8;
  --toggle-text: #6a5828;
}

[data-theme="dark"] {
  --bg: #0f0e0c;
  --panel: #12100b;
  --text: #e6a820;
  --accent: #c8901a;
  --border: #3a2e18;
  --subtext: #8a7a5a;
  --toggle-bg: #1a1610;
  --toggle-border: #3a2e18;
  --toggle-icon: #c8901a;
  --toggle-hover: #2a2016;
  --toggle-text: #8a7850;
}

/* BASE */
body {
  margin: 0;
  font-family: 'Courier New', monospace;
  background: var(--bg);
  color: var(--text);
  transition: 0.4s;
}

/*  TOGGLE SAME AS LOGIN */
#themeToggle {
  position: fixed;
  top: 18px; right: 20px;
  z-index: 200;
  background: var(--toggle-bg);
  border: 1px solid var(--toggle-border);
  border-radius: 20px;
  padding: 7px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Courier New', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--toggle-icon);
  transition: background 0.3s, border-color 0.3s, color 0.3s;
  user-select: none;
}
#themeToggle:hover { background: var(--toggle-hover); }
#themeToggle .t-icon { font-size: 15px; transition: transform 0.6s ease; display:inline-block; }
#themeToggle:hover .t-icon { transform: rotate(30deg); }
#themeToggle .t-label { color: var(--toggle-text); font-size:10px; }

.t-track {
  width: 34px; height: 18px;
  background: var(--toggle-border);
  border-radius: 9px;
  position: relative;
  transition: background 0.3s;
  flex-shrink: 0;
}

.t-thumb {
  position: absolute;
  top: 3px; left: 3px;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--toggle-icon);
  transition: left 0.3s ease, background 0.3s;
}

[data-theme="light"] .t-thumb {
  left: 19px;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 20px 60px;
  border-bottom: 1px solid var(--border);
}

.logo {
  font-size: 22px;
  letter-spacing: 3px;
}

/* BUTTON */
.btn {
  padding: 10px 25px;
  background: linear-gradient(135deg, #7a4e0a, #c8901a);
  border: none;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}
.btn:hover { transform: scale(1.05); }

/* HERO */
.hero {
  text-align: center;
  padding: 100px 20px;
}

.hero h1 {
  font-size: 40px;
}

.hero .btn {
  margin: 18px 0;
  padding: 15px 42px;
  font-size: 16px;
  letter-spacing: 2px;
}

.hero p {
  color: var(--subtext);
}

/* GLOW */
.glow {
  color: var(--accent);
  text-shadow: 0 0 10px var(--accent);
}

/* SECTIONS */
.section { padding: 60px; }

.cards {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  flex: 1;
  min-width: 250px;
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 25px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  border-color: var(--accent);
}

/* MEDIA */
.media-box {
  height: 150px;
  background: var(--panel);
  border: 1px dashed var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--subtext);
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  border-top: 1px solid var(--border);
  color: var(--subtext);
}

</style>
</head>

<body>

<!--  TOGGLE BUTTON -->
<button id="themeToggle" onclick="toggleTheme()" title="Toggle light/dark mode">
  <span class="t-icon" id="themeIcon">☀</span>
  <div class="t-track"><div class="t-thumb"></div></div>
  <span class="t-label" id="themeLabel">Light</span>
</button>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">MECH<span style="color:var(--subtext)">AUTH</span></div>
</div>

<!-- HERO -->
<div class="hero">
  <h1 class="glow">AquaTrace Dashboard</h1>
  <button class="btn" onclick="goLogin()">ENTER DASHBOARD</button>
  <p>Secure • Intelligent • Real-Time Monitoring</p>
</div>

<!-- FEATURES -->
<div class="section">
  <h2>Core Features</h2>
  <div class="cards">
    <div class="card"> Secure Authentication System</div>
    <div class="card">⚙ Real-Time Industrial Monitoring</div>
    <div class="card"> Data Analytics & Logs</div>
  </div>
</div>

<!-- MEDIA -->
<div class="section">
  <h2>Live Media</h2>
  <div class="cards">
    <div class="card"><div class="media-box">📸 Camera Feed</div></div>
    <div class="card"><div class="media-box">🎥 Surveillance</div></div>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  SYSTEM v2.4.1 • SECURE NETWORK • MECHAUTH
</div>

<script>

// LOGIN NAV
function goLogin(){
  window.location.href = "dashboard.html";
}

// THEME TOGGLE
var themeIcon = document.getElementById("themeIcon");
var themeLabel = document.getElementById("themeLabel");
var theme = localStorage.getItem("theme") || "light";

function applyTheme(mode) {
  document.documentElement.setAttribute("data-theme", mode);
  themeIcon.textContent = mode === "dark" ? "☽" : "☀";
  themeLabel.textContent = mode === "dark" ? "Dark" : "Light";
}

function toggleTheme() {
  theme = theme === "dark" ? "light" : "dark";
  localStorage.setItem("theme", theme);
  applyTheme(theme);
}

applyTheme(theme);

</script>

</body>
</html>
